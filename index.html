<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Workshop Finder | Creatis</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f6f7f9;
  --surface:#ffffff;
  --border:#e0e0e0;
  --text:#1a1a1a;
  --muted:#888;
  --faint:#bbb;
  --chip:#f1f1f1;
  --radius-sm:8px;
  --radius-md:12px;
  --radius-pill:99px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#111113;
    --surface:#1c1c1e;
    --border:#2e2e30;
    --text:#f0f0f0;
    --muted:#888;
    --faint:#555;
    --chip:#2a2a2c;
  }
}
html{-webkit-text-size-adjust:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  padding:env(safe-area-inset-top,0) env(safe-area-inset-right,0) env(safe-area-inset-bottom,0) env(safe-area-inset-left,0);
  line-height:1.6;
}
.app{max-width:560px;margin:0 auto;padding:1.25rem 1rem 3rem}
.header{display:flex;align-items:baseline;gap:8px;margin-bottom:1.25rem}
.header h1{font-size:20px;font-weight:700;letter-spacing:-0.3px}
.header span{font-size:13px;color:var(--muted)}

.filter-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:1rem 1.125rem;margin-bottom:1rem}
.filter-label{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:12px}
.filter-pills{display:flex;flex-wrap:wrap;gap:6px}
.filter-pill{
  font-size:13px;padding:5px 14px;border-radius:var(--radius-pill);
  background:var(--chip);color:var(--muted);border:1px solid var(--border);
  cursor:pointer;transition:transform .12s;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
.filter-pill:hover{transform:scale(1.05)}
.filter-pill:active{transform:scale(.95)}
.filter-pill.active{background:var(--text);color:var(--bg);border-color:var(--text)}

.notesure{
  background:var(--chip);border-radius:var(--radius-sm);
  padding:.75rem 1rem;margin-bottom:.75rem;
  font-size:13px;color:var(--muted);line-height:1.8;
}
.notesure strong{color:var(--text);font-weight:600;display:block;margin-bottom:4px}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:1rem 1.125rem;margin-bottom:.75rem}
.card-header{display:flex;align-items:center;gap:14px}
.icon{
  width:52px;height:52px;flex-shrink:0;border-radius:var(--radius-sm);
  border:1px solid var(--border);background:var(--chip);
  object-fit:cover;
}
.kit-name{font-size:16px;font-weight:600}
.kit-sub{font-size:12px;color:var(--muted);margin-top:2px}
.tag-row{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.tag{font-size:11px;padding:3px 9px;border-radius:var(--radius-pill);background:var(--chip);border:1px solid var(--border);color:var(--muted)}

.accordion-toggle{margin-top:12px;font-size:13px;font-weight:500;cursor:pointer;color:var(--muted);-webkit-tap-highlight-color:transparent}
.accordion-toggle:hover{color:var(--text)}
.accordion-content{margin-top:12px;border-top:1px solid var(--border);padding-top:14px;display:none}
.accordion-content.open{display:block}
.kit-tagline{font-size:13px;color:var(--muted);margin-bottom:10px}
.takes-home{font-size:13px;margin-bottom:12px}
.takes-home span{color:var(--muted)}

.empty{font-size:14px;color:var(--faint);text-align:center;padding:1.5rem 0}
.book-link{display:inline-block;font-size:13px;font-weight:600;color:var(--text);border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 14px;text-decoration:none;-webkit-tap-highlight-color:transparent}
.book-link:hover{border-color:var(--muted)}
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <h1>Workshop Finder</h1>
    <span>by Creatis</span>
  </div>

  <div class="filter-card">
    <div class="filter-label">What draws you?</div>
    <div class="filter-pills" id="filters"></div>
  </div>

  <div id="notesure" class="notesure" style="display:none"></div>

  <div id="grid"></div>

</div>
<script>
const WORKSHOPS = [
  {
    name: "Block Printing",
    emoji: "🪵",
    category: "Print",
    age: "10+",
    skill: "All levels",
    tagline: "Create patterns on fabric using hand-carved wooden blocks. Relaxed, hands-on, and beginner-friendly.",
    takes: "Scarf, tableware, pillow cover, apron, bag or dress",
    best: ["First-timers", "Groups", "Casual creatives"],
    notesure: "Want something fun and easy → Block Printing",
    url: "https://creatis.in/products/block-print-workshop",
    img: "https://creatis.in/cdn/shop/files/block_3.png?v=1750371108&width=990"
  },
  {
    name: "Color Making",
    emoji: "🎨",
    category: "Color",
    age: "18+",
    skill: "All levels",
    tagline: "Mix and build colors from scratch using pigment. Understand ratios and color logic with precision.",
    takes: "Your custom color palette",
    best: ["Designers", "Detail-oriented minds"],
    notesure: "Want to understand color deeply → Color Making",
    url: "https://creatis.in/products/color-making-workshop",
    img: "https://creatis.in/cdn/shop/files/IMG_20190130_120800-1_1.jpg?v=1763722250&width=990"
  },
  {
    name: "Block Making",
    emoji: "🔨",
    category: "Carve",
    age: "18+",
    skill: "Intermediate – Advanced",
    tagline: "Carve your own wooden printing block. Design in reverse, learn carving techniques, and take home a tool you made.",
    takes: "A hand-carved printing block",
    best: ["Hands-on builders", "Craft enthusiasts"],
    notesure: "Want to build something from scratch → Block Making",
    url: "https://creatis.in/products/block-making-workshop",
    img: "https://creatis.in/cdn/shop/files/block_making_JPG.webp?v=1761556647&width=990"
  },
  {
    name: "Embroidery",
    emoji: "🧵",
    category: "Stitch",
    age: "18+",
    skill: "All levels",
    tagline: "Build texture using needle and thread. Learn foundational stitches in a slow, focused, meditative process.",
    takes: "Scarf, hooped sampler, tableware, bag or shirt",
    best: ["Precision lovers", "Quiet makers"],
    notesure: "Want a calm, slow experience → Embroidery",
    url: "https://creatis.in/products/embroidery-workshop",
    img: "https://creatis.in/cdn/shop/files/IMG_7304_2.jpg?v=1751604404&width=990"
  }
];

const FILTERS = ["All", "Print", "Color", "Carve", "Stitch"];
let active = "All";

const fEl = document.getElementById("filters");
FILTERS.forEach(f => {
  const b = document.createElement("button");
  b.className = "filter-pill" + (f === "All" ? " active" : "");
  b.textContent = f;
  b.onclick = () => {
    active = f;
    document.querySelectorAll(".filter-pill").forEach(x => x.classList.remove("active"));
    b.classList.add("active");
    render();
  };
  fEl.appendChild(b);
});

function render() {
  const grid = document.getElementById("grid");
  const ns = document.getElementById("notesure");
  grid.innerHTML = "";

  const list = WORKSHOPS.filter(w => active === "All" || w.category === active);

  if (!list.length) {
    grid.innerHTML = '<div class="empty">No workshops in this category.</div>';
    ns.style.display = "none";
    return;
  }

  if (active === "All") {
    ns.style.display = "block";
    ns.innerHTML = `<strong>Not sure?</strong>${WORKSHOPS.map(w => w.notesure).join("<br>")}`;
  } else {
    ns.style.display = "none";
  }

  list.forEach((w, i) => {
    const uid = "acc-" + i + "-" + w.name.replace(/\W/g, "");
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <div class="card-header">
        <img class="icon" src="${w.img}" alt="${w.name}" />
        <div>
          <div class="kit-name">${w.name}</div>
          <div class="kit-sub">${w.category}</div>
          <div class="tag-row">
            <span class="tag">Age ${w.age}</span>
            <span class="tag">2 hrs</span>
            <span class="tag">${w.skill}</span>
          </div>
        </div>
      </div>
      <div class="accordion-toggle" data-id="${uid}">View details →</div>
      <div class="accordion-content" id="${uid}">
        <p class="kit-tagline">${w.tagline}</p>
        <p class="takes-home"><span>You take home: </span>${w.takes}</p>
        <div class="tag-row" style="margin-bottom:14px">${w.best.map(b => `<span class="tag">${b}</span>`).join("")}</div>
        <a class="book-link" href="${w.url}" target="_blank">Book this workshop ↗</a>
      </div>`;
    grid.appendChild(card);
  });

  document.querySelectorAll(".accordion-toggle").forEach(btn => {
    btn.addEventListener("click", () => {
      const el = document.getElementById(btn.dataset.id);
      const open = el.classList.toggle("open");
      btn.textContent = open ? "Hide details ↑" : "View details →";
    });
  });
}

render();
</script>
</body>
</html>
